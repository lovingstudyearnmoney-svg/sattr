 }
];

// ── STATE ──
let currentModule = 0;
let currentQ = 0;
let userAnswers = MODULES.map(m => new Array(m.questions.length).fill(null));
let revealed    = MODULES.map(m => new Array(m.questions.length).fill(false));
let aiExplanations = MODULES.map(m => new Array(m.questions.length).fill(null));
let timerInterval = null;
let timeLeft = MODULES[0].time;
let shareQIdx = null;
let selectedShareTargets = new Set();

// ── SCALED SCORING ──
const RW_SCALE=[200,210,220,230,240,250,260,270,280,290,300,310,320,330,340,350,360,370,380,390,400,410,420,430,440,450,460,470,480,490,500,510,520,530,540,550,560,570,580,590,600,610,620,630,640,650,660,670,680,690,700,710,720,730,740,750,760,770,780,790,800];
function rawToScaled(raw,total,table){raw=Math.max(0,Math.min(raw,total));const idx=Math.round((raw/total)*(table.length-1));return Math.round(table[idx]/10)*10;}

// ── AI EXPLANATION ──
async function getAIExplanation(qIdx, isCorrect, chosenIdx) {
  const q = MODULES[currentModule].questions[qIdx];
  const letters = ['A','B','C','D'];
  const chosen = q.choices[chosenIdx];
  const correct = q.choices[q.answer];

  const prompt = isCorrect
    ? `SAT question type: ${q.type}\nQuestion: ${q.body}\nThe student answered: ${letters[chosenIdx]}. ${chosen} — which is CORRECT.\nIn 2-3 sentences, explain WHY this answer is correct and what key insight it tests. Be concise and educational.`
    : `SAT question type: ${q.type}\nQuestion: ${q.body}\nThe student answered: ${letters[chosenIdx]}. ${chosen} — which is WRONG.\nThe correct answer is: ${letters[q.answer]}. ${correct}\nIn 2-3 sentences, explain why the student's answer is wrong and why the correct answer is right. Be concise and educational.`;

  try {
    const apiKey = getApiKey();
    if (!apiKey) {
      // No key — just use built-in explanation
      return q.explanation;
    }
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: ANTHROPIC_MODEL,
        max_tokens: 200,
        messages:[{role:'user', content: prompt}]
      })
    });
    const data = await res.json();
    if (data.content && data.content[0]) return data.content[0].text;
    if (data.error) {
      console.warn('AI explanation error:', data.error.message);
    }
    return q.explanation;
  } catch(e) {
    return q.explanation;
  }
}

// ── TIMER ──
function startTimer() {
  clearInterval(timerInterval);
  timeLeft = MODULES[currentModule].time;
  timerInterval = setInterval(() => {
    timeLeft--;
    const m = Math.floor(timeLeft/60), s = timeLeft%60;
    const el = document.getElementById('timerDisplay');
    el.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    el.className = 'timer-val' + (timeLeft < 120 ? ' urgent' : '');
    if (timeLeft <= 0) { clearInterval(timerInterval); endModule(); }
  }, 1000);
}

function switchModule(idx) {
  currentModule = idx;
  currentQ = 0;
  document.querySelectorAll('.module-tab').forEach((t,i) => t.classList.toggle('active', i===idx));
  document.getElementById('moduleTitle').textContent = MODULES[idx].title;
  document.getElementById('moduleSubtitle').textContent = MODULES[idx].subtitle;
  startTimer();
  renderSidebar();
  renderQuestion();
}

// ── SIDEBAR ──
function renderSidebar() {
  const mod = MODULES[currentModule];
  const grid = document.getElementById('qGrid');
  grid.innerHTML = '';
  mod.questions.forEach((q,i) => {
    const d = document.createElement('div');
    d.className = 'q-dot';
    d.textContent = i+1;
    if (i===currentQ) d.classList.add('current');
    else if (userAnswers[currentModule][i] !== null) {
      if (revealed[currentModule][i]) d.classList.add(userAnswers[currentModule][i]===q.answer?'correct':'wrong');
      else d.classList.add('answered');
    }
    d.onclick = () => { currentQ=i; renderSidebar(); renderQuestion(); };
    grid.appendChild(d);
  });
  const answered = userAnswers[currentModule].filter(a=>a!==null).length;
  document.getElementById('progressFill').style.width = (answered/mod.questions.length*100)+'%';
  document.getElementById('progressLabel').textContent = `${answered} of ${mod.questions.length} answered`;
  let score=0;
  MODULES.forEach((m,mi)=>m.questions.forEach((q,qi)=>{if(revealed[mi][qi]&&userAnswers[mi][qi]===q.answer)score++;}));
  document.getElementById('navScore').textContent = score;
}

// ── RENDER QUESTION ──
function renderQuestion() {
  const area = document.getElementById('questionArea');
  const rs = document.getElementById('resultsScreen');
  rs.classList.remove('show');
  area.style.display = 'block';

  const mod = MODULES[currentModule];
  const q = mod.questions[currentQ];
  const chosen = userAnswers[currentModule][currentQ];
  const isRevealed = revealed[currentModule][currentQ];
  const letters = ['A','B','C','D'];

  const choicesHTML = q.choices.map((c,i) => {
    let cls = 'choice';
    if (isRevealed) {
      cls += ' locked';
      if (i===q.answer) cls += ' correct';
      else if (i===chosen && chosen!==q.answer) cls += ' wrong';
    } else if (i===chosen) cls += ' selected';
    return `<div class="${cls}" onclick="selectChoice(${i})">
      <div class="choice-letter">${letters[i]}</div>
      <div class="choice-text">${c}</div>
    </div>`;
  }).join('');

  const aiExp = aiExplanations[currentModule][currentQ];
  let aiHTML = '';
  if (isRevealed) {
    const isCorrect = chosen === q.answer;
    const headerCls = isCorrect ? 'correct-h' : 'wrong-h';
    const iconCls = isCorrect ? 'ok' : 'err';
    const icon = isCorrect ? '✓' : '✗';
    const resultText = isCorrect ? `Correct — ${letters[q.answer]} is right!` : `Incorrect — the correct answer is ${letters[q.answer]}`;

    const expText = aiExp || '<span style="color:var(--mid);font-style:italic;">Loading AI explanation...</span>';

    aiHTML = `<div class="ai-explanation show" id="aiExpBox">
      <div class="ai-exp-header ${headerCls}">
        <div class="ai-result-icon ${iconCls}">${icon}</div>
        <div class="ai-result-text ${iconCls}">${resultText}</div>
      </div>
      <div class="ai-exp-body">
        <div class="ai-exp-label">
          <svg viewBox="0 0 24 24"><path d="M12 2l3 7h7l-5.5 4 2 7L12 17l-6.5 4 2-7L2 9h7z"/></svg>
          AI Explanation
        </div>
        <div class="ai-exp-text" id="aiExpText">${expText}</div>
      </div>
    </div>`;
  }

  area.innerHTML = `
    <div class="q-card">
      <div class="q-meta">
        <div class="q-num-badge">Q${currentQ+1}</div>
        <div class="q-type-badge">${q.type}</div>
        <button class="btn-share-q" onclick="openShareModal(${currentQ})">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          Share
        </button>
      </div>
      <div class="q-body">${q.body.replace(/\n/g,'<br>')}</div>
      ${q.prompt ? `<div class="q-prompt">${q.prompt}</div>` : ''}
      <div class="choices">${choicesHTML}</div>
      ${!isRevealed ? `<button class="btn-submit-ans" id="submitBtn" onclick="submitAnswer()" ${chosen===null?'disabled':''}>Check answer</button>` : ''}
      ${aiHTML}
    </div>`;
}

function selectChoice(idx) {
  if (revealed[currentModule][currentQ]) return;
  userAnswers[currentModule][currentQ] = idx;
  renderQuestion();
  renderSidebar();
  const btn = document.getElementById('submitBtn');
  if (btn) btn.disabled = false;
}

async function submitAnswer() {
  const qIdx = currentQ;
  const mi = currentModule;
  revealed[mi][qIdx] = true;
  renderQuestion();
  renderSidebar();

  // Fetch AI explanation if not already fetched
  if (!aiExplanations[mi][qIdx]) {
    const isCorrect = userAnswers[mi][qIdx] === MODULES[mi].questions[qIdx].answer;
    const chosenIdx = userAnswers[mi][qIdx];
    const explanation = await getAIExplanation(qIdx, isCorrect, chosenIdx);
    aiExplanations[mi][qIdx] = explanation;
    // Update the explanation text in the DOM if still on same question
    if (currentQ === qIdx && currentModule === mi) {
      const el = document.getElementById('aiExpText');
      if (el) el.innerHTML = explanation;
    }
  }
}

function prevQ() { if(currentQ>0){currentQ--;renderSidebar();renderQuestion();} }
function nextQ() {
  const mod = MODULES[currentModule];
  if (currentQ < mod.questions.length-1) { currentQ++; renderSidebar(); renderQuestion(); }
  else endModule();
}

function endModule() {
  clearInterval(timerInterval);
  const isLast = currentModule === MODULES.length-1;
  if (!isLast) {
    const mod = MODULES[currentModule];
    let correct = mod.questions.filter((q,i) => userAnswers[currentModule][i]===q.answer).length;
    document.getElementById('questionArea').innerHTML = `
      <div style="background:var(--white);border:1px solid var(--pale);border-radius:14px;padding:36px;text-align:center;animation:fadeUp .4s ease both;">
        <div style="font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--dark2);margin-bottom:8px;">Module complete!</div>
        <div style="font-size:14px;color:var(--mid);margin-bottom:24px;">You got <strong style="color:var(--dark2);">${correct}/${mod.questions.length}</strong> correct.</div>
        <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
          <button onclick="switchModule(${currentModule+1})" style="background:var(--dark2);color:#fff;border:none;padding:12px 24px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;" onmouseover="this.style.background='#C4854A'" onmouseout="this.style.background='var(--dark2)'">Continue →</button>
          <button onclick="endTest()" style="background:transparent;color:var(--dark2);border:1.5px solid var(--pale);padding:12px 24px;border-radius:8px;font-size:14px;cursor:pointer;font-family:'DM Sans',sans-serif;">Finish & see score</button>
        </div>
      </div>`;
  } else endTest();
}

function endTest() {
  clearInterval(timerInterval);
  let rwCorrect=0, rwTotal=0, totalCorrect=0, totalWrong=0, totalSkipped=0;
  MODULES.forEach((mod,mi) => {
    mod.questions.forEach((q,qi) => {
      rwTotal++;
      const ans = userAnswers[mi][qi];
      if (ans===null) totalSkipped++;
      else if (ans===q.answer) { rwCorrect++; totalCorrect++; }
      else totalWrong++;
    });
  });
  const rwScaled = rawToScaled(rwCorrect, rwTotal, RW_SCALE);
  const total = Math.round((rwScaled + 400) / 10) * 10;
  const grade = total>=700?{label:'Excellent',bg:'#EAF3DE',color:'#3B6D11'}:total>=600?{label:'Great',bg:'rgba(196,133,74,0.15)',color:'#C4854A'}:total>=500?{label:'Good',bg:'rgba(196,174,150,0.2)',color:'#7B6B5A'}:{label:'Keep Practicing',bg:'#FCEBEB',color:'#B94040'};

  // Save
  const progress = JSON.parse(localStorage.getItem('sat_progress')||'{}');
  if (!progress.rwSessions) progress.rwSessions=[];
  if (!progress.mathSessions) progress.mathSessions=[];
  if (!progress.mockSessions) progress.mockSessions=[];
  progress.totalAnswered = (progress.totalAnswered||0)+totalCorrect+totalWrong+totalSkipped;
  progress.totalCorrect  = (progress.totalCorrect||0)+totalCorrect;
  progress.rwSessions.push({date:new Date().toISOString(),score:rwScaled,correct:rwCorrect,wrong:totalWrong,skipped:totalSkipped});
  localStorage.setItem('sat_progress', JSON.stringify(progress));

  document.getElementById('questionArea').style.display='none';
  const rs = document.getElementById('resultsScreen');
  rs.classList.add('show');

  let animCurrent = 200;
  rs.innerHTML = `
    <div class="sat-score-wrap">
      <div class="sat-score-header">
        <div class="sat-logo-txt">SAT Platform · October Mock</div>
        <div class="sat-report-lbl">Score Report · ${new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})}</div>
      </div>
      <div class="sat-total-score">
        <div class="sat-total-label">Reading & Writing Score</div>
        <div><span class="sat-total-num" id="animScore">200</span><span class="sat-total-denom">/ 800</span></div>
        <div class="sat-total-range">Score range: 200–800</div>
        <div class="sat-grade-badge" style="background:${grade.bg};color:${grade.color};">${grade.label}</div>
      </div>
      <div class="sat-sections" style="grid-template-columns:1fr;">
        <div class="sat-section-block">
          <div class="sat-section-name">Reading & Writing (Both Modules)</div>
          <div class="sat-section-score">${rwScaled}</div>
          <div class="sat-section-max">out of 800</div>
          <div class="sat-section-bar"><div class="sat-section-fill" id="rwBar" style="width:0%;background:#C4854A;"></div></div>
        </div>
      </div>
      <div class="sat-breakdown">
        <div class="sat-breakdown-title">Question breakdown</div>
        <div class="sat-breakdown-grid">
          <div class="sat-breakdown-item"><div class="sat-breakdown-num" style="color:#3B6D11;">${totalCorrect}</div><div class="sat-breakdown-lbl">Correct</div></div>
          <div class="sat-breakdown-item"><div class="sat-breakdown-num" style="color:#B94040;">${totalWrong}</div><div class="sat-breakdown-lbl">Incorrect</div></div>
          <div class="sat-breakdown-item"><div class="sat-breakdown-num" style="color:#7B6B5A;">${totalSkipped}</div><div class="sat-breakdown-lbl">Skipped</div></div>
        </div>
      </div>
      <div class="sat-actions">
        <button class="btn-sat-primary" onclick="window.location.href='sat-dashboard.html'">Go to dashboard →</button>
        <button class="btn-sat-secondary" onclick="location.reload()">Try again</button>
      </div>
      <div class="sat-countdown" id="rcd">Redirecting to dashboard in <strong>15</strong> seconds...</div>
    </div>`;

  const target = rwScaled;
  const step = Math.max(1, Math.ceil((target-200)/40));
  const counter = setInterval(()=>{animCurrent=Math.min(animCurrent+step,target);const el=document.getElementById('animScore');if(el)el.textContent=animCurrent;if(animCurrent>=target)clearInterval(counter);},30);
  setTimeout(()=>{const el=document.getElementById('rwBar');if(el)el.style.width=Math.round(((rwScaled-200)/600)*100)+'%';},400);
  let secs=15;
  const cd=setInterval(()=>{secs--;const el=document.getElementById('rcd');if(el)el.innerHTML=`Redirecting to dashboard in <strong>${secs}</strong> seconds...`;if(secs<=0){clearInterval(cd);window.location.href='sat-dashboard.html';}},1000);
}

// ── SHARE ──
const AVATAR_COLORS=['#C4854A','#4A3E33','#3B6D11','#185FA5','#993556','#0F6E56'];
function openShareModal(qIdx) {
  shareQIdx=qIdx;
  selectedShareTargets.clear();
  updateSendBtn();
  document.getElementById('shareNote').value='';
  document.getElementById('shareSearch').value='';
  const q=MODULES[currentModule].questions[qIdx];
  document.getElementById('sharePreviewText').textContent=(q.body+' '+(q.prompt||'')).substring(0,140)+'...';
  buildShareList('');
  document.getElementById('shareOverlay').classList.add('show');
}
function closeShare(){document.getElementById('shareOverlay').classList.remove('show');selectedShareTargets.clear();updateSendBtn();}
function closeShareIfBg(e){if(e.target===document.getElementById('shareOverlay'))closeShare();}
function filterShareList(){buildShareList(document.getElementById('shareSearch').value.toLowerCase());}
function updateSendBtn(){const b=document.getElementById('sendShareBtn');if(b){b.style.opacity=selectedShareTargets.size>0?'1':'0.4';b.style.cursor=selectedShareTargets.size>0?'pointer':'default';}}
function buildShareList(filter){
  const raw=localStorage.getItem('sat_community');
  const data=raw?JSON.parse(raw):{groups:[],dms:[]};
  const groups=(data.groups||[]).filter(g=>!filter||g.name.toLowerCase().includes(filter));
  const dms=(data.dms||[]).filter(d=>!filter||d.with.toLowerCase().includes(filter));
  const list=document.getElementById('shareList');
  list.innerHTML='';
  if(!groups.length&&!dms.length){list.innerHTML='<div style="padding:24px;text-align:center;color:var(--mid);font-size:13px;">No groups or chats yet.<br><a href="sat-community.html" style="color:var(--accent);text-decoration:none;">Open Community →</a></div>';return;}
  function makeItem(key,avatarTxt,col,name,sub){
    const div=document.createElement('div');
    div.style.cssText='display:flex;align-items:center;gap:10px;padding:10px 18px;cursor:pointer;transition:background .15s;';
    div.innerHTML=`<div style="width:38px;height:38px;border-radius:50%;background:${col};display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0;">${avatarTxt}</div><div style="flex:1;"><div style="font-size:13px;font-weight:500;color:var(--dark2);">${name}</div><div style="font-size:11px;color:var(--mid);margin-top:1px;">${sub}</div></div><div class="scircle" style="width:20px;height:20px;border-radius:50%;border:2px solid var(--pale);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;"></div>`;
    div.addEventListener('click',e=>{
      e.stopPropagation();
      const c=div.querySelector('.scircle');
      if(selectedShareTargets.has(key)){selectedShareTargets.delete(key);div.style.background='';c.style.background='';c.style.borderColor='var(--pale)';c.textContent='';}
      else{selectedShareTargets.add(key);div.style.background='rgba(196,133,74,0.08)';c.style.background='var(--accent)';c.style.borderColor='var(--accent)';c.style.color='#fff';c.style.fontSize='12px';c.textContent='✓';}
      updateSendBtn();
    });
    return div;
  }
  if(groups.length){const l=document.createElement('div');l.style.cssText='font-size:9px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--mid);padding:8px 18px 3px;';l.textContent='Groups';list.appendChild(l);groups.forEach((g,i)=>list.appendChild(makeItem('g:'+g.id,g.avatar||g.name[0],AVATAR_COLORS[i%AVATAR_COLORS.length],g.name,(g.topic||'')+'·'+(g.members||[]).length+' members')));}
  if(dms.length){const l=document.createElement('div');l.style.cssText='font-size:9px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--mid);padding:8px 18px 3px;';l.textContent='Private messages';list.appendChild(l);dms.forEach((d,i)=>list.appendChild(makeItem('dm:'+d.id,d.withAvatar||d.with[0],AVATAR_COLORS[(i+2)%AVATAR_COLORS.length],d.with,'Private conversation')));}
}
function sendShare(){
  if(!selectedShareTargets.size||shareQIdx===null){showToast('Select a chat first');return;}
  const q=MODULES[currentModule].questions[shareQIdx];
  const note=(document.getElementById('shareNote').value||'').trim();
  const udata=JSON.parse(localStorage.getItem('sat_user')||'{}');
  const myName=udata.name||udata.firstName||'Student';
  const myAv=udata.avatar||myName[0]||'S';
  const letters=['A','B','C','D'];
  const qText='📚 October Mock — Q'+(shareQIdx+1)+' ('+q.type+')\n\n'+q.body+(q.prompt?'\n\n'+q.prompt:'')+'\n\n'+q.choices.map((c,i)=>letters[i]+'. '+c).join('\n');
  const fullText=note?'💬 '+note+'\n\n'+qText:qText;
  const raw=localStorage.getItem('sat_community');
  const data=raw?JSON.parse(raw):{globalMessages:[],groups:[],dms:[]};
  const now=new Date().toISOString();
  const names=[];
  selectedShareTargets.forEach(key=>{
    const sep=key.indexOf(':');const type=key.substring(0,sep);const id=key.substring(sep+1);
    const msg={id:Date.now()+Math.random(),author:myName,avatar:myAv,color:'c0',text:fullText,time:now,isQuestion:true};
    if(type==='g'){const g=(data.groups||[]).find(x=>x.id===id);if(g){if(!g.messages)g.messages=[];g.messages.push(msg);names.push(g.name);}}
    else if(type==='dm'){const d=(data.dms||[]).find(x=>x.id===id);if(d){if(!d.messages)d.messages=[];d.messages.push(msg);names.push(d.with);}}
  });
  localStorage.setItem('sat_community',JSON.stringify(data));
  closeShare();
  showToast(names.length?'✓ Sent to '+names.join(', '):'✓ Sent!');
}
function showToast(msg){const t=document.getElementById('shareToast');if(!t)return;t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}

// ── INIT ──
function init(){
  // Show API key banner if not set
  if (!getApiKey()) {
    const banner = document.createElement('div');
    banner.id = 'apiKeyBanner';
    banner.style.cssText = 'position:fixed;bottom:80px;right:20px;background:var(--dark2);color:#fff;padding:12px 16px;border-radius:10px;font-size:12px;max-width:240px;z-index:200;box-shadow:0 4px 16px rgba(0,0,0,0.3);line-height:1.5;';
    const bTitle = document.createElement('strong');
    bTitle.style.color = 'var(--accent2)';
    bTitle.textContent = '✨ AI Explanations';
    const bText = document.createTextNode(' — Add your Anthropic API key to enable AI explanations after each answer.');
    const bBtns = document.createElement('div');
    bBtns.style.cssText = 'display:flex;gap:8px;margin-top:8px;';
    const bSet = document.createElement('button');
    bSet.textContent = 'Set key';
    bSet.style.cssText = 'flex:1;background:var(--accent);color:#fff;border:none;padding:6px;border-radius:6px;font-size:11px;cursor:pointer;';
    bSet.onclick = () => { promptApiKey(); banner.remove(); };
    const bLater = document.createElement('button');
    bLater.textContent = 'Later';
    bLater.style.cssText = 'background:transparent;color:var(--light);border:1px solid rgba(255,255,255,0.2);padding:6px 10px;border-radius:6px;font-size:11px;cursor:pointer;';
    bLater.onclick = () => banner.remove();
    bBtns.appendChild(bSet); bBtns.appendChild(bLater);
    banner.appendChild(bTitle); banner.appendChild(bText); banner.appendChild(bBtns);
    document.body.appendChild(banner);
    setTimeout(() => { if(document.getElementById('apiKeyBanner')) banner.remove(); }, 8000);
  }
  const params=new URLSearchParams(window.location.search);
  const mp=params.get('module');
  if(mp==='1'){switchModule(1);}
  else{
    document.querySelectorAll('.module-tab').forEach((t,i)=>t.classList.toggle('active',i===0));
    renderSidebar();renderQuestion();startTimer();
  }
}
init();
</script>
